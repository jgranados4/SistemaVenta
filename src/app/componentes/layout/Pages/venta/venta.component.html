<h5 class="tituloGradiante">Venta</h5>

<div class="mt-2">
  <form
    class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center"
    [formGroup]="FormularioProductoVenta"
    #formDirective="ngForm"
    (ngSubmit)="agregarProductoVenta()"
  >
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Buscar Producto</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input
        type="text"
        matInput
        formControlName="producto"
        [matAutocomplete]="auto"
        placeholder="Escribe para buscar..."
      />
      <mat-autocomplete
        #auto="matAutocomplete"
        [displayWith]="displayProducto"
        (optionSelected)="productoParaVenta($event.option.value)"
      >
        @for (item of listaProductoFiltro(); track item.idProducto) {
        <mat-option [value]="item">
          {{ item.nombre }}
        </mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Cantidad</mat-label>
      <input
        matInput
        type="number"
        formControlName="cantidad"
        min="1"
        placeholder="0"
      />
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Tipo de Pago</mat-label>
      <mat-select formControlName="tipospago">
        <mat-option value="Efectivo"  >Efectivo</mat-option>
        <mat-option value="Tarjeta">Tarjeta</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="col-span-1 md:col-span-1">
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="FormularioProductoVenta.invalid"
        class="w-full py-2"
      >
        Agregar
      </button>
    </div>

    <div class="col-span-1 md:col-span-1">
      <button
        mat-raised-button
        color="warn"
        type="button"
        class="w-full py-2 cursor-default"
      >
        Total: S/. {{ totalPagar() | currency : "USD" : "$" : "1.2-2" }}
      </button>
    </div>
  </form>
</div>
@defer(when listaProductoParaVenta().length > 0){
<div class="mt-4">
  <lib-apx-tabla [columns]="columnasTablas" [data]="listaProductoParaVenta()" />
  <br />

<div class="flex justify-end">
  <button mat-raised-button color="accent" (click)="registrarVenta()" [disabled]="bloqueoBotonRegistar">
    Registrar Venta
  </button>
</div>
</div>
}@placeholder{
<div class="mt-4 p-4 text-center  border border-dashed border-gray-300 rounded">
        <p class="text-gray-500">Agrega productos para comenzar la venta</p>
      </div>
}
