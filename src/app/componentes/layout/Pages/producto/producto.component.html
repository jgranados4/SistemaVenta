<section class="flex justify-between items-center mb-4 gap-4 flex-wrap">
  <!-- Botón de Acción Principal -->
  <button mat-raised-button color="primary" (click)="nuevoProducto()">
    <mat-icon>add</mat-icon>
    Nuevo Producto
  </button>
  <!-- Input de Búsqueda Material Design -->
  <mat-form-field appearance="outline" class="w-full max-w-md search-field" subscriptSizing="dynamic">
    <mat-label>Buscar producto por nombre</mat-label>
    <!-- Icono de Lupa -->
    <mat-icon matPrefix class="text-gray-500 mr-2">search</mat-icon>
    <!-- Input -->
    <input 
      matInput 
      #inputSearch
      type="text" 
      placeholder="Ej. Laptop Gamer"
      (keyup)="aplicarFiltroTabla($event)"
    >
    <!-- Botón de Limpiar -->
    @if (productoFiltro()) {
      <button 
        matSuffix 
        mat-icon-button 
        aria-label="Limpiar búsqueda" 
        (click)="limpiarFiltro(inputSearch)"
      >
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>
</section>

<!-- Tabla con Lazy Loading -->
@defer (on viewport) {
  <lib-apx-tabla 
    [columns]="columnasTablas" 
    [data]="listaFiltrada()" 
    [showActions]="true" 
    (Edit)="handleEdit($event)"
    (Delete)="handleDelete($event)" 
  />
} @placeholder {
  <div class="p-4 bg-gray-50 rounded animate-pulse">
    Cargando tabla de productos...
  </div>
}
