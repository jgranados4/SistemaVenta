<app-modal-generico [title]="tituloModal()">
  <!-- Contenido del formulario -->
  <form [formGroup]="formularioProducto" class="flex flex-col gap-4">
    <!-- Campo: Nombre del Producto -->
    <mat-form-field appearance="outline">
      <mat-label>Nombre del Producto</mat-label>
      <input
        matInput
        formControlName="nombre"
        placeholder="Ingrese el nombre del producto"
        required
      />
      <app-input-error
        [control]="formularioProducto.get('nombre')"
        label="nombre"
      />
    </mat-form-field>

    <!-- Campo: Categoría -->
    <mat-form-field appearance="outline">
      <mat-label>Categoría</mat-label>
      <mat-select formControlName="idCategoria" required>
        @for(item of valuesCategoria(); track item.idCategoria) {
        <mat-option [value]="item.idCategoria">
          {{ item.descripcion }}
        </mat-option>
        }
      </mat-select>
      <app-input-error
        [control]="formularioProducto.get('idCategoria')"
        label="Debe seleccionar una categoría"
      />
    </mat-form-field>

    <!-- Campo: Stock -->
    <mat-form-field appearance="outline">
      <mat-label>Stock</mat-label>
      <input
        matInput
        type="number"
        formControlName="stock"
        placeholder="Ingrese la cantidad en stock"
        min="0"
        required
      />
      <mat-hint>Cantidad disponible en inventario</mat-hint>
      <app-input-error [control]="formularioProducto.get('stock')" label="stock" />
    </mat-form-field>

    <!-- Campo: Precio -->
    <mat-form-field appearance="outline">
      <mat-label>Precio</mat-label>
      <input
        matInput
        type="number"
        formControlName="precio"
        placeholder="Ingrese el precio"
        required
      />
      <span matPrefix>$ &nbsp;</span>
    <app-input-error [control]="formularioProducto.get('precio')" label="precio" />
    </mat-form-field>

    <!-- Campo: Estado Activo -->
    <mat-form-field appearance="outline">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="esActivo">
        <mat-option value="1">Activo</mat-option>
        <mat-option value="0">Inactivo</mat-option>
      </mat-select>
    </mat-form-field>
  </form>

  <!-- Footer con botones -->
  <div footer class="flex justify-end gap-2">
    <button mat-button [mat-dialog-close]="false">Cancelar</button>
    <button
      mat-raised-button
      color="primary"
      [disabled]="formularioProducto.invalid"
      (click)="GuardarEditar_producto()"
      type="button"
    >
      {{ botonAccion() }}
    </button>
  </div>
</app-modal-generico>
